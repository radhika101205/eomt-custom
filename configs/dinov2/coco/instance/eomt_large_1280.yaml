trainer:
  max_epochs: 12
  check_val_every_n_epoch: 2
  logger:
    class_path: lightning.pytorch.loggers.wandb.WandbLogger
    init_args:
      resume: allow
      project: "eomt"
      name: "coco_instance_eomt_large_1280"
model:
  class_path: training.mask_classification_instance.MaskClassificationInstance
  init_args:
    attn_mask_annealing_enabled: True
    attn_mask_annealing_start_steps: [14782, 29564, 44346, 59128]
    attn_mask_annealing_end_steps: [29564, 44346, 59128, 73910]
    network:
      class_path: models.eomt.EoMT
      init_args:
        num_q: 200
        encoder:
          class_path: models.vit.ViT
data:
  class_path: local_datasets.coco.COCO
  init_args:
    path: /kaggle/input/datasets/awsaf49/coco-2017-dataset/coco2017
    # If the file requires other args like batch_size, add them here too:
    batch_size: 4
    num_workers: 4
    img_size: [1280, 1280]
